<head>

  <!-- Docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0.9.0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" href="styles/custom.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%2300D4AA'/><text x='50' y='58' font-family='Inter,sans-serif' font-size='50' font-weight='800' fill='%230A0E1A' text-anchor='middle' dominant-baseline='middle'>N</text></svg>">
</head>
<body>
  <div id="app">Cargando...</div>

  <script>
    window.$docsify = {
      name: '<span class="app-name-logo">NEO</span><span class="app-name-accent">MAAA</span><span class="app-name-sub">BROKER</span>',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 0,
      auto2top: true,
      nativeEmoji: true,
      sidebarDisplayLevel: 1,
      notFoundPage: '404.md',
      search: {
        placeholder: 'Buscar en el portal...',
        noData: 'Sin resultados',
        depth: 3,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Error',
        successText: 'Copiado!'
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Siguiente',
        crossChapter: true,
        crossChapterText: true,
      },
      formatUpdated: '{DD}/{MM}/{YYYY}',
    }
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

  <!-- PDF Download Plugin — links to pre-generated PDF files -->
  <script>
    function downloadPDF() {
      // Map current page hash to PDF filename
      var hash = window.location.hash.replace('#/', '').replace('.md', '');
      if (!hash || hash === '/') { window.location.hash = '#/pdf/es/index'; return; }
      var pdfName = hash.replace(/\//g, '-');
      var pdfUrl = 'pdf/es/' + pdfName + '.pdf';
      // Try to download the pre-generated PDF
      var a = document.createElement('a');
      a.href = pdfUrl;
      a.download = 'NEOMAAA-' + pdfName + '.pdf';
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      hook.ready(function() {
        var btn = document.createElement('button');
        btn.className = 'pdf-download-btn';
        btn.textContent = 'Descargar PDF';
        btn.addEventListener('click', downloadPDF);
        document.body.appendChild(btn);
      });
      hook.afterEach(function(html, next) {
        var isHome = window.location.hash === '#/' || window.location.hash === '' || window.location.hash === '#';
        if (!isHome) {
          var banner = '<div class="pdf-banner">' +
            '<span class="pdf-banner-text">Este documento esta disponible para descarga</span>' +
            '<button class="pdf-banner-btn" onclick="downloadPDF()">Descargar PDF</button>' +
            '</div>';
          html = banner + html;
        }
        next(html);
      });
    });
  </script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2.1.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.6.0/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>

  <!-- Sidebar Collapse -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
