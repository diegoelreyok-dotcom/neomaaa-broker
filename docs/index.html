<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NEOMAAA Broker — Operations Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NEOMAAA Broker - Portal Operativo Interno">
  <meta name="theme-color" content="#00D4AA">

  <!-- Open Graph -->
  <meta property="og:title" content="NEOMAAA Broker — Operations Hub">
  <meta property="og:description" content="Portal operativo interno del broker NEOMAAA">
  <meta property="og:type" content="website">

  <!-- Docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0.9.0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" href="styles/custom.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%2300D4AA'/><text x='50' y='58' font-family='Inter,sans-serif' font-size='50' font-weight='800' fill='%230A0E1A' text-anchor='middle' dominant-baseline='middle'>N</text></svg>">
</head>
<body>
  <div id="app">Cargando...</div>

  <script>
    window.$docsify = {
      name: '<span class="app-name-logo">NEO</span><span class="app-name-accent">MAAA</span><span class="app-name-sub">BROKER</span>',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 0,
      auto2top: true,
      nativeEmoji: true,
      sidebarDisplayLevel: 1,
      notFoundPage: '404.md',
      search: {
        placeholder: 'Buscar en el portal...',
        noData: 'Sin resultados',
        depth: 3,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Error',
        successText: 'Copiado!'
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Siguiente',
        crossChapter: true,
        crossChapterText: true,
      },
      progress: {
        position: "top",
        color: "var(--theme-color,#00D4AA)",
        height: "3px",
      },
      formatUpdated: '{DD}/{MM}/{YYYY}',
    }
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

  <!-- PDF Download Plugin -->
  <script>
    function downloadPDF() {
      // Open a new clean window with just the content, styled for print
      var content = document.querySelector('.markdown-section');
      if (!content) return;

      var h1 = content.querySelector('h1');
      var title = h1 ? h1.textContent.trim() : 'NEOMAAA Documento';

      var printWindow = window.open('', '_blank');
      printWindow.document.write('<!DOCTYPE html><html><head>');
      printWindow.document.write('<title>' + title + '</title>');
      printWindow.document.write('<style>');
      printWindow.document.write('* { box-sizing: border-box; margin: 0; padding: 0; }');
      printWindow.document.write('body { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1a1a1a; background: #fff; padding: 40px 50px; line-height: 1.7; font-size: 14px; }');
      printWindow.document.write('h1 { font-size: 1.8em; font-weight: 800; color: #000; border-bottom: 2px solid #00D4AA; padding-bottom: 10px; margin-bottom: 20px; }');
      printWindow.document.write('h2 { font-size: 1.4em; font-weight: 700; color: #006B55; margin-top: 28px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #ddd; }');
      printWindow.document.write('h3 { font-size: 1.15em; font-weight: 600; color: #000; margin-top: 20px; margin-bottom: 8px; }');
      printWindow.document.write('h4 { font-size: 0.95em; font-weight: 600; color: #444; margin-top: 16px; margin-bottom: 6px; }');
      printWindow.document.write('p { margin: 8px 0; color: #333; }');
      printWindow.document.write('strong { color: #000; }');
      printWindow.document.write('a { color: #006B55; text-decoration: none; }');
      printWindow.document.write('ul, ol { margin: 8px 0 8px 24px; color: #333; }');
      printWindow.document.write('li { margin: 4px 0; }');
      printWindow.document.write('table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }');
      printWindow.document.write('th { background: #f0f0f0; color: #000; font-weight: 600; text-align: left; padding: 10px 12px; border: 1px solid #ddd; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }');
      printWindow.document.write('td { padding: 8px 12px; border: 1px solid #eee; color: #333; }');
      printWindow.document.write('tr:nth-child(even) { background: #fafafa; }');
      printWindow.document.write('blockquote { border-left: 3px solid #00D4AA; background: #f0fdf4; padding: 10px 16px; margin: 16px 0; border-radius: 0 6px 6px 0; }');
      printWindow.document.write('blockquote p { color: #333; }');
      printWindow.document.write('code { background: #f4f4f5; color: #333; padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }');
      printWindow.document.write('pre { background: #f8f8f8; border: 1px solid #ddd; border-radius: 6px; padding: 14px; overflow-x: auto; margin: 12px 0; }');
      printWindow.document.write('pre code { background: none; padding: 0; }');
      printWindow.document.write('hr { border: none; border-top: 1px solid #ddd; margin: 24px 0; }');
      printWindow.document.write('.pdf-banner { display: none; }');
      printWindow.document.write('.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; border: 1px solid currentColor; }');
      printWindow.document.write('.footer-print { margin-top: 40px; padding-top: 16px; border-top: 1px solid #ddd; font-size: 11px; color: #999; text-align: center; }');
      printWindow.document.write('@media print { body { padding: 20px 30px; } @page { margin: 15mm; size: A4; } }');
      printWindow.document.write('</style>');
      printWindow.document.write('</head><body>');

      // Clone content without banners
      var clone = content.cloneNode(true);
      clone.querySelectorAll('.pdf-banner').forEach(function(el) { el.remove(); });
      printWindow.document.write(clone.innerHTML);

      // Footer
      printWindow.document.write('<div class="footer-print">NEOMAAA Markets — Documento Interno — ' + new Date().toLocaleDateString('es-ES') + '</div>');
      printWindow.document.write('</body></html>');
      printWindow.document.close();

      // Wait for content to render, then trigger print (Save as PDF)
      setTimeout(function() {
        printWindow.print();
      }, 500);
    }

    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      // Floating button
      hook.ready(function() {
        var btn = document.createElement('button');
        btn.className = 'pdf-download-btn';
        btn.textContent = 'Descargar PDF';
        btn.addEventListener('click', downloadPDF);
        document.body.appendChild(btn);
      });
      // Inline banner (not on homepage)
      hook.afterEach(function(html, next) {
        var isHome = window.location.hash === '#/' || window.location.hash === '' || window.location.hash === '#';
        if (!isHome) {
          var banner = '<div class="pdf-banner">' +
            '<span class="pdf-banner-text">Este documento esta disponible para descarga</span>' +
            '<button class="pdf-banner-btn" onclick="downloadPDF()">Descargar PDF</button>' +
            '</div>';
          html = banner + html;
        }
        next(html);
      });
    });
  </script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2.1.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.6.0/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>

  <!-- Sidebar Collapse -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
