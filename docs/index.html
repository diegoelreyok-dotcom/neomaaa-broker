<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NEOMAAA Broker - Portal Operativo Interno">

  <!-- Open Graph -->
  <meta property="og:title" content="NEOMAAA Broker — Operations Hub">
  <meta property="og:description" content="Portal operativo interno del broker NEOMAAA">
  <meta property="og:type" content="website">

  <!-- Docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0.9.0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" href="styles/custom.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%2300D4AA'/><text x='50' y='58' font-family='Inter,sans-serif' font-size='50' font-weight='800' fill='%230A0E1A' text-anchor='middle' dominant-baseline='middle'>N</text></svg>">
</head>
<body>
  <div id="app">Cargando...</div>

  <script>
    window.$docsify = {
      name: '<span class="app-name-logo">NEO</span><span class="app-name-accent">MAAA</span><span class="app-name-sub">BROKER</span>',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 0,
      auto2top: true,
      nativeEmoji: true,
      sidebarDisplayLevel: 1,
      notFoundPage: '404.md',
      search: {
        placeholder: 'Buscar en el portal...',
        noData: 'Sin resultados',
        depth: 3,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Error',
        successText: 'Copiado!'
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Siguiente',
        crossChapter: true,
        crossChapterText: true,
      },
      formatUpdated: '{DD}/{MM}/{YYYY}',
    }
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

  <!-- PDF Download Plugin — links to pre-generated PDF files -->
  <script>
    // Map of page paths to their PDF filenames
    var pdfMap = {
      'sales/plan-contacto': 'sales-plan-contacto',
      'sales/training': 'sales-training',
      'sales/commissions': 'sales-commissions',
      'sales/objections-broker': 'sales-objections-broker',
      'sales/faq-ventas': 'sales-faq-ventas',
      'compliance/workflow': 'compliance-workflow',
      'compliance/onboarding': 'compliance-onboarding',
      'compliance/ab-book-policy': 'compliance-ab-book-policy',
      'compliance/manual-susana': 'compliance-manual-susana',
      'compliance/workflow-sales-compliance': 'compliance-workflow-sales-compliance',
      'support/playbook': 'support-playbook',
      'support/enciclopedia-soporte': 'support-enciclopedia-soporte',
      'operations/deposits': 'operations-deposits',
      'operations/go-live-runbook': 'operations-go-live-runbook',
      'operations/faq-interno': 'operations-faq-interno',
      'marketing/retencion-broker': 'marketing-retencion-broker',
      'marketing/funnel-broker': 'marketing-funnel-broker',
      'marketing/copy-broker': 'marketing-copy-broker',
      'marketing/competidores-broker': 'marketing-competidores-broker',
      'hiring/finance-manager': 'hiring-finance-manager',
      'hiring/support-es': 'hiring-support-es',
      'hiring/support-en': 'hiring-support-en',
      'hiring/marketing-manager': 'hiring-marketing-manager',
      'partners/programa-completo': 'partners-programa-completo',
      'partners/modelo-financiero': 'partners-modelo-financiero',
      'partners/guia-operativa': 'partners-guia-operativa',
      'encyclopedia/abc': 'encyclopedia-abc',
      'launch/checklist': 'launch-checklist'
    };

    function downloadPDFLang(lang) {
      var hash = window.location.hash.replace('#/', '').replace('.md', '');
      var pdfName = pdfMap[hash];
      if (!pdfName) return;
      var prefix = lang === 'ru' ? 'pdf/ru/ru-' : 'pdf/es/';
      var file = prefix + pdfName + '.pdf';
      var a = document.createElement('a');
      a.href = file;
      a.download = 'NEOMAAA-' + pdfName + (lang === 'ru' ? '-RU' : '-ES') + '.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      closeLangModal();
    }

    function showLangModal() {
      var existing = document.getElementById('pdf-lang-modal');
      if (existing) { existing.style.display = 'flex'; return; }

      var overlay = document.createElement('div');
      overlay.id = 'pdf-lang-modal';
      overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);';
      overlay.addEventListener('click', function(e) { if (e.target === overlay) closeLangModal(); });

      var modal = document.createElement('div');
      modal.style.cssText = 'background:#111827;border:1px solid #1F2937;border-radius:16px;padding:32px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);';

      modal.innerHTML = '<div style="font-size:18px;font-weight:700;color:#F9FAFB;margin-bottom:6px;">Descargar PDF</div>' +
        '<div style="font-size:13px;color:#9CA3AF;margin-bottom:24px;">Selecciona el idioma del documento</div>' +
        '<div style="display:flex;gap:12px;justify-content:center;">' +
          '<button onclick="downloadPDFLang(\'es\')" style="flex:1;padding:14px 20px;background:#00D4AA;color:#0A0E1A;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:all 0.2s;">Espanol</button>' +
          '<button onclick="downloadPDFLang(\'ru\')" style="flex:1;padding:14px 20px;background:#1F2937;color:#F9FAFB;border:1px solid #374151;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:all 0.2s;">Ruso</button>' +
        '</div>' +
        '<div style="margin-top:16px;"><button onclick="closeLangModal()" style="background:none;border:none;color:#6B7280;font-size:12px;cursor:pointer;font-family:Inter,sans-serif;">Cancelar</button></div>';

      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }

    function closeLangModal() {
      var modal = document.getElementById('pdf-lang-modal');
      if (modal) modal.style.display = 'none';
    }

    function downloadPDF() {
      var hash = window.location.hash.replace('#/', '').replace('.md', '');
      if (!pdfMap[hash]) {
        window.location.hash = '#/pdf/es/index';
        return;
      }
      showLangModal();
    }

    function hasPDF() {
      var hash = window.location.hash.replace('#/', '').replace('.md', '');
      return !!pdfMap[hash];
    }

    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      hook.ready(function() {
        var btn = document.createElement('button');
        btn.className = 'pdf-download-btn';
        btn.textContent = 'Descargar PDF';
        btn.addEventListener('click', downloadPDF);
        document.body.appendChild(btn);
      });
      hook.doneEach(function() {
        var btn = document.querySelector('.pdf-download-btn');
        if (btn) btn.style.display = hasPDF() ? 'block' : 'none';
      });
      hook.afterEach(function(html, next) {
        if (hasPDF()) {
          var banner = '<div class="pdf-banner">' +
            '<span class="pdf-banner-text">Este documento esta disponible para descarga</span>' +
            '<button class="pdf-banner-btn" onclick="downloadPDF()">Descargar PDF</button>' +
            '</div>';
          html = banner + html;
        }
        next(html);
      });
    });
  </script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2.1.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.6.0/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>

  <!-- Sidebar Collapse -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
