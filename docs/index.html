<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NEOMAAA Broker — Operations Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NEOMAAA Broker - Portal Operativo Interno">
  <meta name="theme-color" content="#00D4AA">

  <!-- Open Graph -->
  <meta property="og:title" content="NEOMAAA Broker — Operations Hub">
  <meta property="og:description" content="Portal operativo interno del broker NEOMAAA">
  <meta property="og:type" content="website">

  <!-- Docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0.9.0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" href="styles/custom.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%2300D4AA'/><text x='50' y='58' font-family='Inter,sans-serif' font-size='50' font-weight='800' fill='%230A0E1A' text-anchor='middle' dominant-baseline='middle'>N</text></svg>">
</head>
<body>
  <div id="app">Cargando...</div>

  <script>
    window.$docsify = {
      name: '<span class="app-name-logo">NEO</span><span class="app-name-accent">MAAA</span><span class="app-name-sub">BROKER</span>',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 0,
      auto2top: true,
      nativeEmoji: true,
      sidebarDisplayLevel: 1,
      notFoundPage: '404.md',
      search: {
        placeholder: 'Buscar en el portal...',
        noData: 'Sin resultados',
        depth: 3,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Error',
        successText: 'Copiado!'
      },
      pagination: {
        previousText: 'Anterior',
        nextText: 'Siguiente',
        crossChapter: true,
        crossChapterText: true,
      },
      progress: {
        position: "top",
        color: "var(--theme-color,#00D4AA)",
        height: "3px",
      },
      formatUpdated: '{DD}/{MM}/{YYYY}',
    }
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

  <!-- html2pdf for direct .pdf file download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>

  <!-- PDF Download Plugin -->
  <script>
    function downloadPDF() {
      var content = document.querySelector('.markdown-section');
      if (!content) { alert('No se encontro contenido para descargar.'); return; }

      // Get filename from h1
      var h1 = content.querySelector('h1');
      var title = h1 ? h1.textContent.trim() : 'NEOMAAA-documento';
      var filename = 'NEOMAAA-' + title.replace(/[^a-zA-Z0-9\s-]/g, '').replace(/\s+/g, '-').substring(0, 50);

      // Show loading state on all buttons
      var allBtns = document.querySelectorAll('.pdf-download-btn, .pdf-banner-btn');
      allBtns.forEach(function(b) { b.textContent = 'Generando...'; b.disabled = true; });

      // Create a wrapper div with white background and proper styling
      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'background:#fff; color:#1a1a1a; padding:30px 40px; font-family:Inter,-apple-system,sans-serif; font-size:13px; line-height:1.6; max-width:800px;';

      // Clone and clean content
      var clone = content.cloneNode(true);
      // Remove banners
      var banners = clone.querySelectorAll('.pdf-banner');
      for (var i = 0; i < banners.length; i++) banners[i].parentNode.removeChild(banners[i]);

      // Apply inline styles for PDF rendering
      var styles = {
        'h1': 'color:#000;font-size:22px;font-weight:800;border-bottom:2px solid #00D4AA;padding-bottom:8px;margin:0 0 16px 0;',
        'h2': 'color:#006B55;font-size:18px;font-weight:700;margin:24px 0 10px 0;padding-bottom:6px;border-bottom:1px solid #ddd;',
        'h3': 'color:#000;font-size:15px;font-weight:600;margin:18px 0 8px 0;',
        'h4': 'color:#444;font-size:13px;font-weight:600;margin:14px 0 6px 0;',
        'p': 'color:#333;margin:6px 0;',
        'li': 'color:#333;margin:3px 0;',
        'strong': 'color:#000;',
        'a': 'color:#006B55;',
        'blockquote': 'border-left:3px solid #00D4AA;background:#f0fdf4;padding:8px 14px;margin:12px 0;',
        'code': 'background:#f4f4f5;color:#333;padding:1px 4px;border-radius:3px;font-size:0.85em;',
        'pre': 'background:#f8f8f8;border:1px solid #ddd;border-radius:4px;padding:12px;margin:10px 0;overflow:hidden;',
        'table': 'width:100%;border-collapse:collapse;margin:12px 0;font-size:12px;',
        'th': 'background:#f0f0f0;color:#000;font-weight:600;text-align:left;padding:8px 10px;border:1px solid #ddd;font-size:10px;',
        'td': 'padding:6px 10px;border:1px solid #eee;color:#333;',
        'hr': 'border:none;border-top:1px solid #ddd;margin:20px 0;'
      };

      Object.keys(styles).forEach(function(tag) {
        var els = clone.querySelectorAll(tag);
        for (var j = 0; j < els.length; j++) {
          els[j].style.cssText = styles[tag];
        }
      });

      // Pre code no background
      var preCodes = clone.querySelectorAll('pre code');
      for (var k = 0; k < preCodes.length; k++) {
        preCodes[k].style.cssText = 'background:none;padding:0;color:#333;font-size:12px;';
      }

      wrapper.appendChild(clone);

      // Add footer
      var footer = document.createElement('div');
      footer.style.cssText = 'margin-top:30px;padding-top:12px;border-top:1px solid #ddd;font-size:10px;color:#999;text-align:center;';
      footer.textContent = 'NEOMAAA Markets — Documento Interno — ' + new Date().toLocaleDateString('es-ES');
      wrapper.appendChild(footer);

      // Generate PDF
      var opt = {
        margin: 10,
        filename: filename + '.pdf',
        image: { type: 'jpeg', quality: 0.92 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] }
      };

      html2pdf().set(opt).from(wrapper).save()
        .then(function() {
          allBtns.forEach(function(b) {
            b.textContent = 'Descargar PDF';
            b.disabled = false;
          });
        })
        .catch(function(err) {
          console.error('PDF error:', err);
          allBtns.forEach(function(b) {
            b.textContent = 'Descargar PDF';
            b.disabled = false;
          });
          alert('Error al generar PDF. Intenta de nuevo.');
        });
    }

    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      hook.ready(function() {
        var btn = document.createElement('button');
        btn.className = 'pdf-download-btn';
        btn.textContent = 'Descargar PDF';
        btn.addEventListener('click', downloadPDF);
        document.body.appendChild(btn);
      });
      hook.afterEach(function(html, next) {
        var isHome = window.location.hash === '#/' || window.location.hash === '' || window.location.hash === '#';
        if (!isHome) {
          var banner = '<div class="pdf-banner">' +
            '<span class="pdf-banner-text">Este documento esta disponible para descarga</span>' +
            '<button class="pdf-banner-btn" onclick="downloadPDF()">Descargar PDF</button>' +
            '</div>';
          html = banner + html;
        }
        next(html);
      });
    });
  </script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2.1.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.6.0/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>

  <!-- Sidebar Collapse -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
